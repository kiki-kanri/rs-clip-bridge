name: Binaries Release

on:
  push:
    tags:
      - "rs-clip-bridge-client-v*"
      - "rs-clip-bridge-server-v*"
  workflow_dispatch: null

concurrency:
  group: binaries-release
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: windows-2025-vs2026
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: windows-2025-vs2026
            target: aarch64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          cache: true

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install Zig and cargo-zigbuild (ARM Linux only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: mlugg/setup-zig@v2
        with:
          version: latest

      - name: Cache cargo-zigbuild
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        id: cache-zigbuild
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-zigbuild
          key: cargo-zigbuild-${{ runner.os }}

      - name: Install cargo-zigbuild
        if: matrix.target == 'aarch64-unknown-linux-gnu' &&
          steps.cache-zigbuild.outputs.cache-hit != 'true'
        run: cargo install cargo-zigbuild

      - name: Build
        shell: bash
        run: |
          target="${{ matrix.target }}"

          case "${target}" in
            *windows*)
              powershell.exe -NoProfile -ExecutionPolicy Bypass -File "scripts/build/release/internal/${target}.ps1" --workspace
              ;;
            *)
              "./scripts/build/release/${target}.sh" --workspace
              ;;
          esac

      - name: Prepare Artifacts
        shell: bash
        run: |
          target="${{ matrix.target }}"
          ext=""
          [[ "${target}" == *"windows"* ]] && ext=".exe"

          mkdir -p ./output
          cp "target/${target}/release/rs-clip-bridge-client${ext}" "./output/rs-clip-bridge-client-${target}${ext}"
          cp "target/${target}/release/rs-clip-bridge-server${ext}" "./output/rs-clip-bridge-server-${target}${ext}"

      - name: Upload Binaries (Artifacts)
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.target }}
          path: ./output/*
          retention-days: 3

  publish:
    name: Attach Binaries to Release
    needs: build
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Update Latest Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -f latest
          git push origin latest --force

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: ./all-binaries
          merge-multiple: true

      - name: Verify downloaded binaries
        shell: bash
        run: |
          actual_count="$(find ./all-binaries -type f | wc -l)"
          expected_count=14

          if [[ "${actual_count}" -ne "${expected_count}" ]]; then
            echo "expected ${expected_count} binaries, found ${actual_count}" >&2
            find ./all-binaries -type f -print >&2
            exit 1
          fi

      - name: Clear existing release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if ! gh api "repos/${{ github.repository }}/releases/tags/latest" >/tmp/latest-release.json 2>/dev/null; then
            exit 0
          fi

          jq -r '.assets[].id' /tmp/latest-release.json | while read -r asset_id; do
            gh api --method DELETE "repos/${{ github.repository }}/releases/assets/${asset_id}"
          done

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: "Latest Release Build"
          files: ./all-binaries/*
          overwrite_files: true
          prerelease: true
          body: |
            ## Automated Build Artifacts (Latest)
            This release contains the latest binaries automatically generated by GitHub Actions.

            - **Source Tag/Branch**: `${{ github.ref_name }}`
            - **Build Time**: `${{ github.event.head_commit.timestamp || 'Manual Trigger' }}`
            - **Commit SHA**: `${{ github.sha }}`

            *Note: These are rolling builds and may contain experimental features.*
