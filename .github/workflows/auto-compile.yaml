name: Auto compile

on:
  push:
    tags:
      - "rs-clip-bridge-client-v*"
      - "rs-clip-bridge-server-v*"
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: "Try to upload to release (Manual trigger)"
        required: true
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: windows-latest
            target: aarch64-pc-windows-msvc

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          cache: true

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install Zig and cargo-zigbuild (ARM Linux only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: mlugg/setup-zig@v2
        with:
          version: latest

      - name: Cache cargo-zigbuild
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        id: cache-zigbuild
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-zigbuild
          key: cargo-zigbuild-${{ runner.os }}

      - name: Install cargo-zigbuild
        if: matrix.target == 'aarch64-unknown-linux-gnu' && steps.cache-zigbuild.outputs.cache-hit != 'true'
        run: cargo install cargo-zigbuild

      - name: Build
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *"-pc-windows-msvc" ]]; then
            export RUSTFLAGS="-C target-feature=+crt-static"
            echo "Windows MSVC detected: Enabling static CRT linking..."
          fi

          if [ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]; then
            cargo zigbuild -r --target ${{ matrix.target }} --workspace
          else
            cargo b -r --target ${{ matrix.target }} --workspace
          fi

      - name: Prepare Artifacts (Rename for clarity)
        shell: bash
        run: |
          mkdir -p ./output
          EXT=""
          [[ "${{ matrix.target }}" == *"windows"* ]] && EXT=".exe"

          cp target/${{ matrix.target }}/release/rs-clip-bridge-client$EXT ./output/rs-clip-bridge-client-${{ matrix.target }}$EXT || true
          cp target/${{ matrix.target }}/release/rs-clip-bridge-server$EXT ./output/rs-clip-bridge-server-${{ matrix.target }}$EXT || true

      - name: Upload Binaries
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.target }}
          path: ./output/*
          overwrite: true
          retention-days: 1

  publish:
    name: Update Release Assets
    needs: build
    if: |
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' && inputs.upload_to_release == true)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: ./all-binaries
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ./all-binaries/*
          overwrite: true
          body_path: ""
